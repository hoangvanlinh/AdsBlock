<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site blocked — AdBlock</title>
  <style>
    :root { color-scheme: light dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #0f172a;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
      .card { background: #1e293b !important; box-shadow: 0 10px 30px rgba(0,0,0,.4) !important; }
      .host { background: #0f172a !important; }
      .hint { color: #94a3b8 !important; }
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
      max-width: 480px;
      width: 100%;
      padding: 40px 36px;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(239, 68, 68, .12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 18px;
    }
    h1 { font-size: 22px; margin-bottom: 10px; }
    .host {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 8px 14px;
      display: inline-block;
      margin: 6px 0 14px;
      word-break: break-all;
    }
    p { font-size: 14px; line-height: 1.6; }
    .hint { color: #64748b; margin-bottom: 24px; }
    button {
      font: inherit;
      font-weight: 600;
      border: 0;
      border-radius: 10px;
      padding: 11px 26px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>Site blocked for your safety</h1>
    <div class="host" id="host">unknown site</div>
    <p class="hint">
      This site is on a malware / phishing blocklist. It may try to steal your
      information, mine cryptocurrency, or install unwanted software.
    </p>
    <button id="back">Go back</button>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
